name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:run

  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No NUXT_APP_BASE_URL here — Lighthouse audits the site at root,
      # unlike deploy.yml which prefixes /clearance-website/ for GitHub Pages.
      - name: Generate static site
        run: pnpm generate

      - name: Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        if: always()
        with:
          configPath: ./lighthouserc.cjs

      - name: Comment Lighthouse results on PR
        if: always() && github.event_name == 'pull_request' && steps.lhci.outputs.resultsPath != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULTS_PATH: ${{ steps.lhci.outputs.resultsPath }}
          LINKS: ${{ steps.lhci.outputs.links }}
        run: |
          MANIFEST="$RESULTS_PATH/manifest.json"
          if [ ! -f "$MANIFEST" ]; then exit 0; fi

          COMMENT="## Lighthouse Report\n\n"
          COMMENT+="| URL | Performance | Accessibility | Best Practices | SEO |\n"
          COMMENT+="|-----|:-----------:|:------------:|:--------------:|:---:|\n"

          for row in $(jq -c '.[]' "$MANIFEST"); do
            URL=$(echo "$row" | jq -r '.url')
            REPORT_URL=$(echo "$row" | jq -r '.htmlPath // .jsonPath')
            SUMMARY=$(jq '.categories | to_entries | map({key: .key, score: (.value.score * 100 | round)}) | from_entries' "$(echo "$row" | jq -r '.jsonPath')")
            PERF=$(echo "$SUMMARY" | jq '.performance')
            A11Y=$(echo "$SUMMARY" | jq '.accessibility')
            BP=$(echo "$SUMMARY" | jq '."best-practices"')
            SEO=$(echo "$SUMMARY" | jq '.seo')
            COMMENT+="| \`${URL}\` | ${PERF} | ${A11Y} | ${BP} | ${SEO} |\n"
          done

          if [ -n "$LINKS" ]; then
            COMMENT+="\n**Report links:** ${LINKS}\n"
          fi

          printf "$COMMENT" | gh pr comment "${{ github.event.pull_request.number }}" --body-file -

      - name: Create issue on Lighthouse regression
        if: always() && steps.lhci.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULTS_PATH: ${{ steps.lhci.outputs.resultsPath }}
          LINKS: ${{ steps.lhci.outputs.links }}
        run: |
          REPORT=$(jq -r '
            .[] | select(.level == "error" or .level == "warn") |
            "- **\(.level)**: \(.auditId // .name) — score \(.actual) (expected ≥ \(.expected))"
          ' "$RESULTS_PATH/assertion-results.json")

          gh issue create \
            --title "Lighthouse regression detected on $(date +%Y-%m-%d)" \
            --label "lighthouse" \
            --assignee wazolab \
            --body "$(cat <<EOF
          ## Lighthouse CI failed

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`

          ### Failures

          ${REPORT}

          ### Report links

          ${LINKS}
          EOF
          )"
